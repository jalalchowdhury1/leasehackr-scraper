name: Daily Leasehackr Scraper
on:
  schedule:
    # Runs at 8:00 AM UTC (3:00 AM EST) every day
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI
jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'
    - name: Validate required secrets
      run: |
        if [ -z "${{ secrets.GOOGLE_CREDENTIALS }}" ]; then
          echo "Error: GOOGLE_CREDENTIALS secret is not set"
          exit 1
        fi
        if [ -z "${{ secrets.TELEGRAM_TOKEN }}" ]; then
          echo "Error: TELEGRAM_TOKEN secret is not set"
          exit 1
        fi
        if [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
          echo "Error: TELEGRAM_CHAT_ID secret is not set"
          exit 1
        fi
        echo "All required secrets are present"
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Install Scrapling Browsers
      run: scrapling install
    - name: Run Scraper
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python scraper.py
