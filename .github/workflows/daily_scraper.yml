name: Daily Scraper
on:
  schedule:
    # Runs at 7:06 AM UTC (3:06 AM EDT / 2:06 AM EST) every day
    - cron: '6 7 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI
jobs:
  daily:
    name: Daily Sheet (scraper_daily.py)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.9'
        cache: 'pip'
    - name: Validate required secrets
      run: |
        if [ -z "${{ secrets.SPREADSHEET_ID }}" ]; then
          echo "Error: SPREADSHEET_ID secret is not set"
          exit 1
        fi
        if [ -z "${{ secrets.GOOGLE_CREDENTIALS }}" ]; then
          echo "Error: GOOGLE_CREDENTIALS secret is not set"
          exit 1
        fi
        if [ -z "${{ secrets.TELEGRAM_TOKEN }}" ]; then
          echo "Error: TELEGRAM_TOKEN secret is not set"
          exit 1
        fi
        if [ -z "${{ secrets.TELEGRAM_CHAT_ID }}" ]; then
          echo "Error: TELEGRAM_CHAT_ID secret is not set"
          exit 1
        fi
        echo "All required secrets are present"
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --retries 5 --timeout 60 -r requirements.txt
    - name: Install Scrapling Browsers
      # Camoufox is downloaded from the GitHub releases API. GITHUB_TOKEN lifts
      # the rate limit from 60/hr (shared-runner IP) to 1000/hr; the retry loop
      # absorbs transient network/5xx hiccups during the large browser download.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        for attempt in 1 2 3; do
          echo "scrapling install — attempt $attempt/3"
          if scrapling install; then
            echo "Browsers installed successfully."
            exit 0
          fi
          [ "$attempt" -lt 3 ] && { echo "Failed; retrying in 30s..."; sleep 30; }
        done
        echo "scrapling install failed after 3 attempts" >&2
        exit 1
    - name: Sleep 5 minutes before running daily scraper
      run: sleep 300
    - name: Run Daily Scraper
      env:
        SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python scraper_daily.py
